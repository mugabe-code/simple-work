<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Out - SmartPark SIMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-car"></i>
                <h1>SmartPark SIMS</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="spare_parts.html"><i class="fas fa-cogs"></i> Spare Parts</a></li>
                    <li><a href="stock_in.html"><i class="fas fa-arrow-down"></i> Stock In</a></li>
                    <li><a href="stock_out.html" class="active"><i class="fas fa-arrow-up"></i> Stock Out</a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                </ul>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stock Out Form -->
            <div class="form-container">
                <h2><i class="fas fa-arrow-up"></i> Record Stock Out</h2>
                <form id="stockOutForm">
                    <div class="form-group">
                        <label for="partSelectOut"><i class="fas fa-cogs"></i> Select Spare Part *</label>
                        <select id="partSelectOut" class="form-control" required>
                            <option value="">Select a spare part</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="availableQuantity"><i class="fas fa-box"></i> Available Quantity</label>
                        <input type="text" id="availableQuantity" class="form-control" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="stockOutQuantity"><i class="fas fa-hashtag"></i> Quantity *</label>
                        <input type="number" id="stockOutQuantity" class="form-control" min="1" required placeholder="Enter quantity being removed">
                    </div>
                    
                    <div class="form-group">
                        <label for="stockOutDate"><i class="fas fa-calendar"></i> Date *</label>
                        <input type="date" id="stockOutDate" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="customer"><i class="fas fa-user"></i> Customer/Department (Optional)</label>
                        <input type="text" id="customer" class="form-control" placeholder="Enter customer or department name">
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose"><i class="fas fa-briefcase"></i> Purpose (Optional)</label>
                        <input type="text" id="purpose" class="form-control" placeholder="Enter purpose of removal">
                    </div>
                    
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-save"></i> Record Stock Out
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Clear Form
                    </button>
                </form>
            </div>

            <!-- Stock Out Records -->
            <div class="table-container">
                <h2><i class="fas fa-history"></i> Stock Out History</h2>
                
                <div class="search-filter">
                    <div class="search-box">
                        <input type="text" id="searchStockOut" class="form-control" placeholder="Search stock out records...">
                    </div>
                    <div class="filter-group">
                        <input type="date" id="dateFilterOut" class="form-control" placeholder="Filter by date">
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="stockOutTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Part Name</th>
                                <th>Category</th>
                                <th>Quantity</th>
                                <th>Unit Price (RWF)</th>
                                <th>Total Price (RWF)</th>
                                <th>Date</th>
                                <th>Customer/Dept</th>
                                <th>Purpose</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stockOutBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 SmartPark Rwanda. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Set today's date as default
        document.getElementById('stockOutDate').valueAsDate = new Date();

        // Form submission
        document.getElementById('stockOutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            recordStockOut();
        });

        // Part selection change
        document.getElementById('partSelectOut').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            if (selectedOption.value) {
                const spareParts = JSON.parse(localStorage.getItem('spareParts') || '[]');
                const part = spareParts.find(p => p.id == selectedOption.value);
                if (part) {
                    document.getElementById('availableQuantity').value = part.quantity;
                }
            } else {
                document.getElementById('availableQuantity').value = '';
            }
        });

        // Quantity validation
        document.getElementById('stockOutQuantity').addEventListener('input', function() {
            const available = parseInt(document.getElementById('availableQuantity').value) || 0;
            const requested = parseInt(this.value) || 0;
            
            if (requested > available) {
                this.setCustomValidity('Quantity cannot exceed available stock');
                this.style.borderColor = '#e74c3c';
            } else {
                this.setCustomValidity('');
                this.style.borderColor = '#ddd';
            }
        });

        // Search functionality
        document.getElementById('searchStockOut').addEventListener('input', filterStockOut);
        document.getElementById('dateFilterOut').addEventListener('change', filterStockOut);

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadSparePartsDropdown();
            loadStockOutRecords();
        });

        function loadSparePartsDropdown() {
            const spareParts = JSON.parse(localStorage.getItem('spareParts') || '[]');
            const select = document.getElementById('partSelectOut');
            
            // Clear existing options except the first one
            select.innerHTML = '<option value="">Select a spare part</option>';
            
            spareParts.forEach(part => {
                if (part.quantity > 0) { // Only show parts with available stock
                    const option = document.createElement('option');
                    option.value = part.id;
                    option.textContent = `${part.name} (${part.category}) - Available: ${part.quantity}`;
                    option.dataset.unitPrice = part.unitPrice;
                    option.dataset.available = part.quantity;
                    select.appendChild(option);
                }
            });
        }

        function recordStockOut() {
            const selectedPart = document.getElementById('partSelectOut');
            const partId = selectedPart.value;
            const partName = selectedPart.options[selectedPart.selectedIndex].text.split(' (')[0];
            const availableQuantity = parseInt(document.getElementById('availableQuantity').value);
            const stockOutQuantity = parseInt(document.getElementById('stockOutQuantity').value);
            
            if (!partId) {
                alert('Please select a spare part');
                return;
            }

            if (stockOutQuantity > availableQuantity) {
                alert('Insufficient stock available');
                return;
            }

            const stockOutData = {
                partId: partId,
                partName: partName,
                category: selectedPart.options[selectedPart.selectedIndex].text.match(/\((.*?)\)/)[1],
                quantity: stockOutQuantity,
                unitPrice: selectedPart.options[selectedPart.selectedIndex].dataset.unitPrice,
                totalPrice: stockOutQuantity * parseFloat(selectedPart.options[selectedPart.selectedIndex].dataset.unitPrice),
                date: document.getElementById('stockOutDate').value,
                customer: document.getElementById('customer').value,
                purpose: document.getElementById('purpose').value
            };

            // Add to stock out records
            let stockOutRecords = JSON.parse(localStorage.getItem('stockOutRecords') || '[]');
            stockOutData.id = Date.now();
            stockOutRecords.push(stockOutData);
            localStorage.setItem('stockOutRecords', JSON.stringify(stockOutRecords));

            // Update spare parts quantity
            updateSparePartQuantity(partId, -stockOutQuantity);

            // Reset form
            document.getElementById('stockOutForm').reset();
            document.getElementById('stockOutDate').valueAsDate = new Date();
            document.getElementById('availableQuantity').value = '';
            
            // Reload tables
            loadStockOutRecords();
            loadSparePartsDropdown();
            
            alert('Stock out record saved successfully!');
        }

        function updateSparePartQuantity(partId, quantityChange) {
            let spareParts = JSON.parse(localStorage.getItem('spareParts') || '[]');
            const partIndex = spareParts.findIndex(part => part.id == partId);
            
            if (partIndex > -1) {
                const currentQuantity = parseInt(spareParts[partIndex].quantity);
                spareParts[partIndex].quantity = currentQuantity + quantityChange;
                spareParts[partIndex].totalPrice = spareParts[partIndex].quantity * parseFloat(spareParts[partIndex].unitPrice);
                localStorage.setItem('spareParts', JSON.stringify(spareParts));
            }
        }

        function loadStockOutRecords() {
            const stockOutRecords = JSON.parse(localStorage.getItem('stockOutRecords') || '[]');
            const tbody = document.getElementById('stockOutBody');
            
            tbody.innerHTML = '';
            
            // Sort by date (newest first)
            stockOutRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            stockOutRecords.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.id}</td>
                    <td>${record.partName}</td>
                    <td>${record.category}</td>
                    <td>${record.quantity}</td>
                    <td>${parseFloat(record.unitPrice).toLocaleString()}</td>
                    <td>${parseFloat(record.totalPrice).toLocaleString()}</td>
                    <td>${new Date(record.date).toLocaleDateString()}</td>
                    <td>${record.customer || 'N/A'}</td>
                    <td>${record.purpose || 'N/A'}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteStockOut(${record.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterStockOut() {
            const searchTerm = document.getElementById('searchStockOut').value.toLowerCase();
            const dateFilter = document.getElementById('dateFilterOut').value;
            const rows = document.querySelectorAll('#stockOutBody tr');
            
            rows.forEach(row => {
                const partName = row.cells[1].textContent.toLowerCase();
                const date = row.cells[6].textContent;
                const recordDate = row.cells[6].textContent.split('/')[2] + '-' + 
                                  row.cells[6].textContent.split('/')[0].padStart(2, '0') + '-' + 
                                  row.cells[6].textContent.split('/')[1].padStart(2, '0');
                
                const matchesSearch = partName.includes(searchTerm);
                const matchesDate = !dateFilter || recordDate === dateFilter;
                
                row.style.display = matchesSearch && matchesDate ? '' : 'none';
            });
        }

        function deleteStockOut(id) {
            if (confirm('Are you sure you want to delete this stock out record? This will revert the quantity change.')) {
                let stockOutRecords = JSON.parse(localStorage.getItem('stockOutRecords') || '[]');
                const record = stockOutRecords.find(r => r.id === id);
                
                if (record) {
                    // Revert the quantity change
                    updateSparePartQuantity(record.partId, parseInt(record.quantity));
                }
                
                stockOutRecords = stockOutRecords.filter(record => record.id !== id);
                localStorage.setItem('stockOutRecords', JSON.stringify(stockOutRecords));
                loadStockOutRecords();
                loadSparePartsDropdown();
                alert('Stock out record deleted successfully!');
            }
        }
    </script>
</body>
</html>
