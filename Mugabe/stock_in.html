<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock In - SmartPark SIMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
    
        <header class="header">
            <div class="logo">
                <i class="fas fa-car"></i>
                <h1>SmartPark SIMS</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="spare_parts.html"><i class="fas fa-cogs"></i> Spare Parts</a></li>
                    <li><a href="stock_in.html" class="active"><i class="fas fa-arrow-down"></i> Stock In</a></li>
                    <li><a href="stock_out.html"><i class="fas fa-arrow-up"></i> Stock Out</a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                </ul>
            </nav>
        </header>

      
        <main class="main-content">

            <div class="form-container">
                <h2><i class="fas fa-arrow-down"></i> Record Stock In</h2>
                <form id="stockInForm">
                    <div class="form-group">
                        <label for="partSelect"><i class="fas fa-cogs"></i> Select Spare Part *</label>
                        <select id="partSelect" class="form-control" required>
                            <option value="">Select a spare part</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="stockInQuantity"><i class="fas fa-hashtag"></i> Quantity *</label>
                        <input type="number" id="stockInQuantity" class="form-control" min="1" required placeholder="Enter quantity being added">
                    </div>
                    
                    <div class="form-group">
                        <label for="stockInDate"><i class="fas fa-calendar"></i> Date *</label>
                        <input type="date" id="stockInDate" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="supplier"><i class="fas fa-truck"></i> Supplier (Optional)</label>
                        <input type="text" id="supplier" class="form-control" placeholder="Enter supplier name">
                    </div>
                    
                    <div class="form-group">
                        <label for="notes"><i class="fas fa-sticky-note"></i> Notes (Optional)</label>
                        <textarea id="notes" class="form-control" rows="3" placeholder="Additional notes..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Record Stock In
                    </button>
                    <button type="reset" class="btn btn-danger">
                        <i class="fas fa-times"></i> Clear Form
                    </button>
                </form>
            </div>

            <!-- Stock In Records -->
            <div class="table-container">
                <h2><i class="fas fa-history"></i> Stock In History</h2>
                
                <div class="search-filter">
                    <div class="search-box">
                        <input type="text" id="searchStockIn" class="form-control" placeholder="Search stock in records...">
                    </div>
                    <div class="filter-group">
                        <input type="date" id="dateFilter" class="form-control" placeholder="Filter by date">
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="stockInTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Part Name</th>
                                <th>Category</th>
                                <th>Quantity</th>
                                <th>Date</th>
                                <th>Supplier</th>
                                <th>Notes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stockInBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 SmartPark Rwanda. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Set today's date as default
        document.getElementById('stockInDate').valueAsDate = new Date();

        // Form submission
        document.getElementById('stockInForm').addEventListener('submit', function(e) {
            e.preventDefault();
            recordStockIn();
        });

        // Search functionality
        document.getElementById('searchStockIn').addEventListener('input', filterStockIn);
        document.getElementById('dateFilter').addEventListener('change', filterStockIn);

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadSparePartsDropdown();
            loadStockInRecords();
        });

        function loadSparePartsDropdown() {
            const spareParts = JSON.parse(localStorage.getItem('spareParts') || '[]');
            const select = document.getElementById('partSelect');
            
            // Clear existing options except the first one
            select.innerHTML = '<option value="">Select a spare part</option>';
            
            spareParts.forEach(part => {
                const option = document.createElement('option');
                option.value = part.id;
                option.textContent = `${part.name} (${part.category})`;
                option.dataset.unitPrice = part.unitPrice;
                select.appendChild(option);
            });
        }

        function recordStockIn() {
            const selectedPart = document.getElementById('partSelect');
            const partId = selectedPart.value;
            const partName = selectedPart.options[selectedPart.selectedIndex].text;
            
            if (!partId) {
                alert('Please select a spare part');
                return;
            }

            const stockInData = {
                partId: partId,
                partName: partName.split(' (')[0],
                category: partName.match(/\((.*?)\)/)[1],
                quantity: document.getElementById('stockInQuantity').value,
                date: document.getElementById('stockInDate').value,
                supplier: document.getElementById('supplier').value,
                notes: document.getElementById('notes').value
            };

            // Add to stock in records
            let stockInRecords = JSON.parse(localStorage.getItem('stockInRecords') || '[]');
            stockInData.id = Date.now();
            stockInRecords.push(stockInData);
            localStorage.setItem('stockInRecords', JSON.stringify(stockInRecords));

            // Update spare parts quantity
            updateSparePartQuantity(partId, parseInt(stockInData.quantity));

            // Reset form
            document.getElementById('stockInForm').reset();
            document.getElementById('stockInDate').valueAsDate = new Date();
            
            // Reload tables
            loadStockInRecords();
            loadSparePartsDropdown();
            
            alert('Stock in record saved successfully!');
        }

        function updateSparePartQuantity(partId, quantityToAdd) {
            let spareParts = JSON.parse(localStorage.getItem('spareParts') || '[]');
            const partIndex = spareParts.findIndex(part => part.id == partId);
            
            if (partIndex > -1) {
                const currentQuantity = parseInt(spareParts[partIndex].quantity);
                spareParts[partIndex].quantity = currentQuantity + quantityToAdd;
                spareParts[partIndex].totalPrice = spareParts[partIndex].quantity * parseFloat(spareParts[partIndex].unitPrice);
                localStorage.setItem('spareParts', JSON.stringify(spareParts));
            }
        }

        function loadStockInRecords() {
            const stockInRecords = JSON.parse(localStorage.getItem('stockInRecords') || '[]');
            const tbody = document.getElementById('stockInBody');
            
            tbody.innerHTML = '';
            
            // Sort by date (newest first)
            stockInRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            stockInRecords.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.id}</td>
                    <td>${record.partName}</td>
                    <td>${record.category}</td>
                    <td>${record.quantity}</td>
                    <td>${new Date(record.date).toLocaleDateString()}</td>
                    <td>${record.supplier || 'N/A'}</td>
                    <td>${record.notes || 'N/A'}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteStockIn(${record.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterStockIn() {
            const searchTerm = document.getElementById('searchStockIn').value.toLowerCase();
            const dateFilter = document.getElementById('dateFilter').value;
            const rows = document.querySelectorAll('#stockInBody tr');
            
            rows.forEach(row => {
                const partName = row.cells[1].textContent.toLowerCase();
                const date = row.cells[4].textContent;
                const recordDate = row.cells[4].textContent.split('/')[2] + '-' + 
                                  row.cells[4].textContent.split('/')[0].padStart(2, '0') + '-' + 
                                  row.cells[4].textContent.split('/')[1].padStart(2, '0');
                
                const matchesSearch = partName.includes(searchTerm);
                const matchesDate = !dateFilter || recordDate === dateFilter;
                
                row.style.display = matchesSearch && matchesDate ? '' : 'none';
            });
        }

        function deleteStockIn(id) {
            if (confirm('Are you sure you want to delete this stock in record?')) {
                let stockInRecords = JSON.parse(localStorage.getItem('stockInRecords') || '[]');
                const record = stockInRecords.find(r => r.id === id);
                
                if (record) {
                    // Revert the quantity change
                    updateSparePartQuantity(record.partId, -parseInt(record.quantity));
                }
                
                stockInRecords = stockInRecords.filter(record => record.id !== id);
                localStorage.setItem('stockInRecords', JSON.stringify(stockInRecords));
                loadStockInRecords();
                loadSparePartsDropdown();
                alert('Stock in record deleted successfully!');
            }
        }
    </script>
</body>
</html>
